<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD各種マニュアル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f8fafc;
        }
        .manual-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .manual-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-slate-900 text-white shadow-lg">
        <div class="max-w-5xl mx-auto px-6 py-8">
            <h1 class="text-3xl font-bold tracking-tight">HD各種マニュアル</h1>
            <p class="mt-2 text-slate-400">各種業務・運用マニュアルのポータルサイトです。</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- マニュアルカード 1 -->
            <a href="hd-voucher/" class="manual-card block bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                <div class="flex items-center space-x-4">
                    <div class="bg-blue-100 p-3 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-slate-900">HD共通商品券 運用マニュアル</h2>
                        <p class="text-slate-500 mt-1">共通商品券の取り扱い、管理に関するマニュアルはこちらから確認できます。</p>
                    </div>
                </div>
                <div class="mt-4 flex items-center text-blue-600 font-medium">
                    詳細を見る
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </a>

            <!-- 追加用プレースホルダー（必要に応じて複製してください） -->
            <div class="bg-slate-50 border border-dashed border-slate-300 rounded-xl p-6 flex flex-col justify-center items-center text-slate-400">
                <p>追加マニュアル準備中</p>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-20 border-t border-slate-200 py-10 bg-white">
        <div class="max-w-5xl mx-auto px-6 text-center text-slate-500 text-sm">
            &copy; 2024 HD Management All Rights Reserved.
        </div>
    </footer>

</body>
</html>
